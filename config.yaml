# Last Epoch Loot Filter Merger - Order Configuration
#
# Compatible with: Core-Very-Strict.xml (38 rules) and Core-Uber-Strict.xml (29 rules)
#
# Rules present only in Very Strict are included — they will simply be skipped
# (no match found) when merging against the Uber Strict core, causing no errors.
#
# Rules present only in Uber Strict:
#   - "Harbinger's Needle" — VS uses "Harbinger Uniques" instead; both are listed
#     in the same section slot via contains matching so either core works correctly.
#
# HOW SECTIONS WORK:
#   "source" : "core" or "build"
#   "match"  : matched against the rule's nameOverride (case-insensitive)
#   "match_mode":
#     - "exact"      : full name must match exactly
#     - "startswith" : name starts with this string
#     - "contains"   : name contains this string
#   "prefix_build_name": prepend "BuildName - " to rule names
#
# SECTION ORDER:
#   Sections listed first get the highest Order values (evaluated first by the game).
#   Within a "build" section, builds are inserted in the order their files are found.
#
# UNMATCHED RULES:
#   Build rules not matched by any section go to the "unmatched_build_rules" position.
#   Core rules not matched by any section are always included as-is after all sections.

output:
  name_template: "All Builds - {builds}"
  description: "Merged multi-build filter"
  filter_icon: 0
  filter_icon_color: 0

sections:

# ── TOP: HIDE-ALL CATCH ────────────────────────────────────────────────────
- name: "All Items"
  source: core
  match: "All Items"
  match_mode: exact

# ── CURRENCY & UTILITY ─────────────────────────────────────────────────────
- name: "Important Runes"
  source: core
  match: "Important Runes"
  match_mode: exact

- name: "Important Glyphs"
  source: core
  match: "Important Glyphs"
  match_mode: exact

- name: "Woven Echoes"
  source: core
  match: "Woven Echoes"
  match_mode: exact

- name: "Keys & Currency"
  source: core
  match: "Keys & Currency"
  match_mode: exact

# ── CORE IDOL RULES ────────────────────────────────────────────────────────
- name: "Strict - Weaver Idols"
  source: core
  match: "Strict - Weaver Idols"
  match_mode: exact

- name: "Reflect Idols (Alt Leveling)"
  source: core
  match: "Reflect Idols (Alt Leveling)"
  match_mode: exact

# ── BUILD-SPECIFIC STRICT IDOLS ───────────────────────────────────────────
- name: "Strict - Small Idols"
  source: build
  match: "Strict - Small Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Minor Idols"
  source: build
  match: "Strict - Minor Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Humble Idols"
  source: build
  match: "Strict - Humble Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Stout Idols"
  source: build
  match: "Strict - Stout Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Grand Idols"
  source: build
  match: "Strict - Grand Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Large Idols"
  source: build
  match: "Strict - Large Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Huge Idols"
  source: build
  match: "Strict - Huge Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Adorned Idols"
  source: build
  match: "Strict - Adorned Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Ornate Idols"
  source: build
  match: "Strict - Ornate Idols"
  match_mode: exact
  prefix_build_name: true

# ── SHATTER / CRAFTING AFFIXES (per-build) ─────────────────────────────────
- name: "Shatter / Removal / Important Affixes"
  source: build
  match: "Shatter / Removal / Important Affixes"
  match_mode: contains
  prefix_build_name: true

# ── GENERIC HAVOC (custom core rule, VS only — skipped silently on Uber) ───
- name: "Generic Havoc"
  source: core
  match: "Generic Havoc"
  match_mode: exact

# ── WANTED EXPERIMENTALS (per-build) ───────────────────────────────────────
- name: "Wanted Experimental & Tier 7"
  source: build
  match: "Wanted Experimental"
  match_mode: contains
  prefix_build_name: true

# ── CORE TIER 7 SPECIFIC BASES ─────────────────────────────────────────────
- name: "Tier 7 Best Base Belts"
  source: core
  match: "Tier 7 Best Base Belts"
  match_mode: exact

- name: "Tier 7 Eternal Gauntlets"
  source: core
  match: "Tier 7 Eternal Gauntlets"
  match_mode: exact

- name: "Tier 7 Rings & Amulets"
  source: core
  match: "Tier 7 Rings & Amulets"
  match_mode: exact

# ── VS-ONLY: SPECIAL ITEM CATCH-ALLS (absent in Uber Strict) ──────────────
- name: "All Set Items"
  source: core
  match: "All Set Items"
  match_mode: exact

# ── VS-ONLY: SPECIAL ITEM CATCH-ALLS (absent in Uber Strict) ──────────────
- name: "Rare Set Items"
  source: core
  match: "Rare Set Items"
  match_mode: exact

- name: "Unique Items"
  source: core
  match: "Unique Items"
  match_mode: exact

- name: "Weaver's Will Items"
  source: core
  match: "Weaver's Will Items"
  match_mode: exact

# ── CORE SPECIAL UNIQUES ───────────────────────────────────────────────────
- name: "Cocooned Uniques"
  source: core
  match: "Cocooned Uniques"
  match_mode: exact

- name: "Primordial Uniques"
  source: core
  match: "Primordial Uniques"
  match_mode: exact

- name: "All Legendary Items"
  source: core
  match: "All Legendary Items"
  match_mode: exact

# ── VS-ONLY: UNIQUE IDOLS (absent in Uber Strict) ─────────────────────────
- name: "Unique Idols"
  source: core
  match: "Unique Idols"
  match_mode: exact

# ── ALTARS ─────────────────────────────────────────────────────────────────
- name: "Generic Good Altars (Min. Tier 7)"
  source: core
  match: "Generic Good Altars (Min. Tier 7)"
  match_mode: exact

# ── BUILD-SPECIFIC WANTED TIER 7 ──────────────────────────────────────────
- name: "Wanted Tier 7"
  source: build
  match: "Wanted Tier 7"
  match_mode: contains
  prefix_build_name: true

# ── BUILD-SPECIFIC STRICT TIER 7 ITEM RULES ───────────────────────────────
# Varies per build (Helmet, Body Armor, Belt, Gloves, Ring, Relic, Idol Altar, etc.)
- name: "Tier 7 Strict (build-specific)"
  source: build
  match: "Tier 7 Strict"
  match_mode: startswith
  prefix_build_name: true

# ── CORE MULTI-EXALTED RULES ───────────────────────────────────────────────
- name: "Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Multi Exalted (Min. Tier 7 & Tier 6)"
  match_mode: exact

- name: "Multi Exalted (Min. 2 Tier 7)"
  source: core
  match: "Multi Exalted (Min. 2 Tier 7)"
  match_mode: exact

- name: "Triple+ Exalted (Min. 1 Tier 7)"
  source: core
  match: "Triple+ Exalted (Min. 1 Tier 7)"
  match_mode: exact

- name: "Corrupted Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Corrupted Multi Exalted"
  match_mode: contains

# ── VS-ONLY: DUNGEON / BOSS DROPS (absent in Uber Strict) ─────────────────
- name: "Dungeons / Arena Uniques"
  source: core
  match: "Dungeons / Arena Uniques"
  match_mode: exact

# ── CORE GLOBAL UNIQUE TIERS ───────────────────────────────────────────────
- name: "Uniques With 15+ Weaver's Will"
  source: core
  match: "Uniques With 15+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 2 LP (70+ LPL)"
  source: core
  match: "Uniques With 2 LP (70+ LPL)"
  match_mode: exact

# ── VS-ONLY: RARE DROP SOURCES (absent in Uber Strict) ────────────────────
- name: "Rare Dungeon Drops"
  source: core
  match: "Rare Dungeon Drops"
  match_mode: exact

- name: "Rare Monolith Timeline Boss Drops"
  source: core
  match: "Rare Monolith Timeline Boss Drops"
  match_mode: exact

# ── HARBINGER UNIQUES (VS: "Harbinger Uniques" / Uber: "Harbinger's Needle") ──
# contains "Harbinger" matches both names — only one will exist in any given core.
- name: "Harbinger Uniques"
  source: core
  match: "Harbinger"
  match_mode: contains

- name: "A Tier & Very Rare Uniques"
  source: core
  match: "A Tier & Very Rare Uniques"
  match_mode: exact

- name: "Leveling Uniques Campaign"
  source: core
  match: "Leveling Uniques Campaign"
  match_mode: exact

- name: "Leveling Uniques (Reflect  lvl 35)"
  source: core
  match: "Leveling Uniques (Reflect  lvl 35)"
  match_mode: exact

# ── BUILD-SPECIFIC UNIQUE PLANNER RULES ───────────────────────────────────
- name: "Uniques & Sets From Planner"
  source: build
  match: "Uniques & Sets From Planner"
  match_mode: contains
  prefix_build_name: true

- name: "Uniques From Planner 1 LP"
  source: build
  match: "Uniques From Planner 1 LP"
  match_mode: contains
  prefix_build_name: true

# ── CORE HIGH-LP / HIGH-WW UNIQUES ────────────────────────────────────────
- name: "Uniques With 19+ Weaver's Will"
  source: core
  match: "Uniques With 19+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 3 LP (25+ LPL)"
  source: core
  match: "Uniques With 3 LP (25+ LPL)"
  match_mode: exact

- name: "Uniques With 22+ Weaver's Will"
  source: core
  match: "Uniques With 22+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 4 LP (All)"
  source: core
  match: "Uniques With 4 LP (All)"
  match_mode: exact

- name: "S Tier & Extremely Rare Uniques"
  source: core
  match: "S Tier & Extremely Rare Uniques"
  match_mode: exact

# Where to insert any build rules that did not match any section above.
unmatched_build_rules:
  placement: after
  after: "Uniques From Planner 1 LP"
  prefix_build_name: true

ignore_build_rules:
- match: ""
  match_mode: exact
  source: build

overrides:
- match: "Shatter / Removal / Important Affixes"
  match_mode: contains
  source: build
  set:
    isEnabled: false
