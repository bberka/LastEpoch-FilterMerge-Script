# Last Epoch Loot Filter Merger - Order Configuration
#
# Compatible with: Core-Very-Strict.xml (38 rules) and Core-Uber-Strict.xml (30 rules)
#
# VS core  : All Set Items, Rare Set Items, Unique Items, Weaver's Will Items,
#            All Legendary Items, Unique Idols, Dungeons/Arena Uniques,
#            Rare Dungeon/Monolith Drops, Harbinger Uniques — present
# Uber core: Above rules absent; has Harbinger's Needle instead of Harbinger Uniques
#
# Build files may carry rules from the opposite core variant (e.g. Warpath built for Uber).
# These are listed in ignore_build_rules so they are silently dropped.
#
# TRANSFORMS (run before section assignment):
#   Source rule: "Wanted Tier 7 (Can Edit Affixes & Item Type)" in each build
#
#   MUTATE → "Wanted Tier 7 - Non Corrupt"
#     - AffixCondition.combinedComparsionValue: 1 → 7
#     - Adds RarityCondition: EXALTED
#     - Adds CorruptionCondition: OnlyUncorrupted
#
#   DERIVE → "Wanted Havoc" (disabled by default, same affix list)
#     - Derived from the already-mutated Non Corrupt rule
#     - AffixCondition.advanced: true → false  (presence check, any tier)
#     - Injects second AffixCondition: empty affixes, T7 any, combinedValue=15
#       (gates on total T7 count leaving room to craft with Rune of Havoc)
#     - Adds RarityCondition: EXALTED
#     - Adds CorruptionCondition: OnlyUncorrupted
#     - color: 7 → 16, isEnabled: false

output:
  name_template: "All Builds - {builds}"
  description: "Merged multi-build filter"
  filter_icon: 0
  filter_icon_color: 0

# ── TRANSFORMS ────────────────────────────────────────────────────────────────

transforms:

# Step 1 — mutate "Wanted Tier 7" → "Wanted Tier 7 - Non Corrupt"
- match: "Wanted Tier 7 (Can Edit Affixes & Item Type)"
  match_mode: exact
  operation: mutate
  name_replace: "Wanted Tier 7 (Can Edit Affixes & Item Type)"
  name_with: "Wanted Tier 7 - Non Corrupt (Can Edit Affixes & Item Type)"
  condition_patches:
  - type: AffixCondition
    index: 0
    set:
      combinedComparsionValue: "7"
  - type: RarityCondition
    inject_xml: >-
      <Condition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                 xsi:type="RarityCondition"><rarity>EXALTED</rarity></Condition>
  - type: CorruptionCondition
    inject_xml: >-
      <Condition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                 xsi:type="CorruptionCondition"><Corruption>OnlyUncorrupted</Corruption></Condition>

# Step 2 — derive "Wanted Havoc" from the now-mutated rule
- match: "Wanted Tier 7 - Non Corrupt (Can Edit Affixes & Item Type)"
  match_mode: exact
  operation: derive
  name_replace: "Wanted Tier 7 - Non Corrupt"
  name_with: "Wanted Havoc"
  set:
    color: "16"
    isEnabled: "false"
  condition_patches:
  - type: AffixCondition
    index: 0
    set:
      advanced: "false"
  - type: AffixCondition
    inject_xml: >-
      <Condition xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                 xsi:type="AffixCondition">
        <affixes />
        <comparsion>MORE_OR_EQUAL</comparsion>
        <comparsionValue>7</comparsionValue>
        <minOnTheSameItem>1</minOnTheSameItem>
        <combinedComparsion>ANY</combinedComparsion>
        <combinedComparsionValue>15</combinedComparsionValue>
        <advanced>true</advanced>
      </Condition>

sections:

# ── TOP: HIDE-ALL CATCH ────────────────────────────────────────────────────
- name: "All Items"
  source: core
  match: "All Items"
  match_mode: exact

# ── CURRENCY & UTILITY ─────────────────────────────────────────────────────
- name: "Important Runes"
  source: core
  match: "Important Runes"
  match_mode: exact

- name: "Important Glyphs"
  source: core
  match: "Important Glyphs"
  match_mode: exact

- name: "Woven Echoes"
  source: core
  match: "Woven Echoes"
  match_mode: exact

- name: "Keys & Currency"
  source: core
  match: "Keys & Currency"
  match_mode: exact

# ── CORE IDOL RULES ────────────────────────────────────────────────────────
- name: "Strict - Weaver Idols"
  source: core
  match: "Strict - Weaver Idols"
  match_mode: exact

- name: "Reflect Idols (Alt Leveling)"
  source: core
  match: "Reflect Idols (Alt Leveling)"
  match_mode: exact

# ── BUILD-SPECIFIC STRICT IDOLS ───────────────────────────────────────────
- name: "Strict - Small Idols"
  source: build
  match: "Strict - Small Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Minor Idols"
  source: build
  match: "Strict - Minor Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Humble Idols"
  source: build
  match: "Strict - Humble Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Stout Idols"
  source: build
  match: "Strict - Stout Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Grand Idols"
  source: build
  match: "Strict - Grand Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Large Idols"
  source: build
  match: "Strict - Large Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Huge Idols"
  source: build
  match: "Strict - Huge Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Adorned Idols"
  source: build
  match: "Strict - Adorned Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Ornate Idols"
  source: build
  match: "Strict - Ornate Idols"
  match_mode: exact
  prefix_build_name: true

# ── SHATTER / CRAFTING AFFIXES (per-build, disabled by default) ────────────
- name: "Shatter / Removal / Important Affixes"
  source: build
  match: "Shatter / Removal / Important Affixes"
  match_mode: contains
  prefix_build_name: true

# ── GENERIC HAVOC (custom core rule — present in both VS and Uber) ─────────
- name: "Generic Havoc (Can Edit Item Type)"
  source: core
  match: "Generic Havoc (Can Edit Item Type)"
  match_mode: exact

# ── WANTED EXPERIMENTALS (per-build) ───────────────────────────────────────
- name: "Wanted Experimental & Tier 7"
  source: build
  match: "Wanted Experimental"
  match_mode: contains
  prefix_build_name: true

# ── BUILD-SPECIFIC WANTED HAVOC (derived, disabled by default) ─────────────
- name: "Wanted Havoc"
  source: build
  match: "Wanted Havoc"
  match_mode: contains
  prefix_build_name: true

# ── BUILD-SPECIFIC WANTED TIER 7 - NON CORRUPT (mutated from Wanted Tier 7) ─
- name: "Wanted Tier 7 - Non Corrupt"
  source: build
  match: "Wanted Tier 7 - Non Corrupt"
  match_mode: contains
  prefix_build_name: true

# ── BUILD-SPECIFIC STRICT TIER 7 ITEM RULES ───────────────────────────────
# Varies per build (Helmet, Body Armor, Belt, Gloves, Ring, Relic, Idol Altar, etc.)
- name: "Tier 7 Strict (build-specific)"
  source: build
  match: "Tier 7 Strict"
  match_mode: startswith
  prefix_build_name: true

# ── CORE TIER 7 SPECIFIC BASES ─────────────────────────────────────────────
- name: "Tier 7 Best Base Belts"
  source: core
  match: "Tier 7 Best Base Belts"
  match_mode: exact

- name: "Tier 7 Eternal Gauntlets"
  source: core
  match: "Tier 7 Eternal Gauntlets"
  match_mode: exact

- name: "Tier 7 Rings & Amulets"
  source: core
  match: "Tier 7 Rings & Amulets"
  match_mode: exact

# ── CORE ITEM CATCH-ALLS (VS only — absent in Uber Strict, skipped silently) ─
- name: "All Set Items"
  source: core
  match: "All Set Items"
  match_mode: exact

- name: "Rare Set Items"
  source: core
  match: "Rare Set Items"
  match_mode: exact

- name: "Unique Items"
  source: core
  match: "Unique Items"
  match_mode: exact

- name: "Weaver's Will Items"
  source: core
  match: "Weaver's Will Items"
  match_mode: exact

# ── CORE SPECIAL UNIQUES ───────────────────────────────────────────────────
- name: "Cocooned Uniques"
  source: core
  match: "Cocooned Uniques"
  match_mode: exact

- name: "Primordial Uniques"
  source: core
  match: "Primordial Uniques"
  match_mode: exact

# VS and Uber both have "All Legendary Items" — no unnamed rule in either
- name: "All Legendary Items"
  source: core
  match: "All Legendary Items"
  match_mode: exact

# ── CORE UNIQUE IDOLS (VS only — absent in Uber Strict) ───────────────────
- name: "Unique Idols"
  source: core
  match: "Unique Idols"
  match_mode: exact

# ── ALTARS ─────────────────────────────────────────────────────────────────
- name: "Generic Good Altars (Min. Tier 7)"
  source: core
  match: "Generic Good Altars (Min. Tier 7)"
  match_mode: exact

# ── CORE MULTI-EXALTED RULES ───────────────────────────────────────────────
- name: "Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Multi Exalted (Min. Tier 7 & Tier 6)"
  match_mode: exact

- name: "Multi Exalted (Min. 2 Tier 7)"
  source: core
  match: "Multi Exalted (Min. 2 Tier 7)"
  match_mode: exact

- name: "Triple+ Exalted (Min. 1 Tier 7)"
  source: core
  match: "Triple+ Exalted (Min. 1 Tier 7)"
  match_mode: exact

- name: "Corrupted Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Corrupted Multi Exalted"
  match_mode: contains

# ── CORE DUNGEON / BOSS DROPS (VS only — absent in Uber Strict) ───────────
- name: "Dungeons / Arena Uniques"
  source: core
  match: "Dungeons / Arena Uniques"
  match_mode: exact

# ── CORE GLOBAL UNIQUE TIERS ───────────────────────────────────────────────
- name: "Uniques With 15+ Weaver's Will"
  source: core
  match: "Uniques With 15+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 2 LP (70+ LPL)"
  source: core
  match: "Uniques With 2 LP (70+ LPL)"
  match_mode: exact

# ── CORE RARE DROP SOURCES (VS only — absent in Uber Strict) ──────────────
- name: "Rare Dungeon Drops"
  source: core
  match: "Rare Dungeon Drops"
  match_mode: exact

- name: "Rare Monolith Timeline Boss Drops"
  source: core
  match: "Rare Monolith Timeline Boss Drops"
  match_mode: exact

# ── HARBINGER (VS: "Harbinger Uniques" / Uber: "Harbinger's Needle") ───────
# contains "Harbinger" matches both names — only one will exist per core variant
- name: "Harbinger Uniques"
  source: core
  match: "Harbinger"
  match_mode: contains

- name: "A Tier & Very Rare Uniques"
  source: core
  match: "A Tier & Very Rare Uniques"
  match_mode: exact

- name: "Leveling Uniques Campaign"
  source: core
  match: "Leveling Uniques Campaign"
  match_mode: exact

- name: "Leveling Uniques (Reflect  lvl 35)"
  source: core
  match: "Leveling Uniques (Reflect  lvl 35)"
  match_mode: exact

# ── BUILD-SPECIFIC UNIQUE PLANNER RULES ───────────────────────────────────
- name: "Uniques & Sets From Planner"
  source: build
  match: "Uniques & Sets From Planner"
  match_mode: contains
  prefix_build_name: true

- name: "Uniques From Planner 1 LP"
  source: build
  match: "Uniques From Planner 1 LP"
  match_mode: contains
  prefix_build_name: true

# ── CORE HIGH-LP / HIGH-WW UNIQUES ────────────────────────────────────────
- name: "Uniques With 19+ Weaver's Will"
  source: core
  match: "Uniques With 19+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 3 LP (25+ LPL)"
  source: core
  match: "Uniques With 3 LP (25+ LPL)"
  match_mode: exact

- name: "Uniques With 22+ Weaver's Will"
  source: core
  match: "Uniques With 22+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 4 LP (All)"
  source: core
  match: "Uniques With 4 LP (All)"
  match_mode: exact

- name: "S Tier & Extremely Rare Uniques"
  source: core
  match: "S Tier & Extremely Rare Uniques"
  match_mode: exact

# Where to insert any build rules that did not match any section above.
unmatched_build_rules:
  placement: after
  after: "Uniques From Planner 1 LP"
  prefix_build_name: true

# Rules that may appear in build XML files but belong to a different core variant.
# Dropped silently so only the core version is used.
ignore_build_rules:
# Unnamed rules (empty nameOverride) in build files are never build-specific
- match: ""
  match_mode: exact

overrides:
- match: "Shatter / Removal / Important Affixes"
  match_mode: contains
  source: build
  set:
    isEnabled: "false"
