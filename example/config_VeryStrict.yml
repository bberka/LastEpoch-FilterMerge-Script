# Last Epoch Loot Filter Merger - Order Configuration
# Strictness: VERY STRICT
# For use with the Very Strict maxroll filter variant.
# Drops: New Season 4 Uniques, Rare Strict gear, 1 LP uniques.
# Tightens: 2 LP requires 70+ LPL, 3 LP requires 25+ LPL, altar minimum is Tier 7.

output:
  name_template: "All Builds - {builds}"
  description: "Merged multi-build filter (Very Strict)"
  filter_icon: 0
  filter_icon_color: 0

sections:

# ── TOP: HIDE-ALL CATCH ────────────────────────────────────────────────────
- name: "All Items"
  source: core
  match: "All Items"
  match_mode: exact

# ── CURRENCY & UTILITY ─────────────────────────────────────────────────────
- name: "Important Runes"
  source: core
  match: "Important Runes"
  match_mode: exact

- name: "Important Glyphs"
  source: core
  match: "Important Glyphs"
  match_mode: exact

- name: "Woven Echoes"
  source: core
  match: "Woven Echoes"
  match_mode: exact

- name: "Keys & Currency"
  source: core
  match: "Keys & Currency"
  match_mode: exact

# ── REFLECT IDOLS ─────────────────────────────────────────────────────────
- name: "Reflect Idols (Alt Leveling)"
  source: core
  match: "Reflect Idols (Alt Leveling)"
  match_mode: exact

# ── WEAVER IDOLS ──────────────────────────────────────────────────────────
- name: "Strict - Weaver Idols"
  source: core
  match: "Strict - Weaver Idols"
  match_mode: exact

# ── 1-AFFIX IDOLS ─────────────────────────────────────────────────────────
- name: "1 Affix - Small Idols"
  source: core
  match: "1 Affix - Small Idols"
  match_mode: exact

- name: "1 Affix - Minor Idols"
  source: core
  match: "1 Affix - Minor Idols"
  match_mode: exact

- name: "1 Affix - Humble Idols"
  source: core
  match: "1 Affix - Humble Idols"
  match_mode: exact

- name: "1 Affix - Grand Idols"
  source: core
  match: "1 Affix - Grand Idols"
  match_mode: exact

- name: "1 Affix - Large Idols"
  source: core
  match: "1 Affix - Large Idols"
  match_mode: exact

- name: "1 Affix - Ornate Idols"
  source: core
  match: "1 Affix - Ornate Idols"
  match_mode: exact

# ── BUILD-SPECIFIC STRICT IDOLS ───────────────────────────────────────────
- name: "Strict - Small Idols"
  source: build
  match: "Strict - Small Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Minor Idols"
  source: build
  match: "Strict - Minor Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Humble Idols"
  source: build
  match: "Strict - Humble Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Stout Idols"
  source: build
  match: "Strict - Stout Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Grand Idols"
  source: build
  match: "Strict - Grand Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Large Idols"
  source: build
  match: "Strict - Large Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Huge Idols"
  source: build
  match: "Strict - Huge Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Adorned Idols"
  source: build
  match: "Strict - Adorned Idols"
  match_mode: exact
  prefix_build_name: true

- name: "Strict - Ornate Idols"
  source: build
  match: "Strict - Ornate Idols"
  match_mode: exact
  prefix_build_name: true

# ── SHATTER / CRAFTING AFFIXES (per-build) ────────────────────────────────
- name: "Shatter / Removal / Important Affixes"
  source: build
  match: "Shatter / Removal / Important Affixes"
  match_mode: contains
  prefix_build_name: true

# ── WANTED EXPERIMENTALS (Very Strict uses Tier 7 variant) ────────────────
- name: "Wanted Experimental & Tier 7 (Rune of Havoc)"
  source: core
  match: "Wanted Experimental & Tier 7 (Rune of Havoc)"
  match_mode: exact

# ── BUILD-SPECIFIC WANTED EXPERIMENTALS ───────────────────────────────────
- name: "Wanted Experimental (build-specific)"
  source: build
  match: "Wanted Experimental"
  match_mode: contains
  prefix_build_name: true

# ── CORE TIER 7 SPECIFIC BASES ────────────────────────────────────────────
- name: "Tier 7 Best Base Belts"
  source: core
  match: "Tier 7 Best Base Belts"
  match_mode: exact

- name: "Tier 7 Eternal Gauntlets"
  source: core
  match: "Tier 7 Eternal Gauntlets"
  match_mode: exact

- name: "Tier 7 Rings & Amulets"
  source: core
  match: "Tier 7 Rings & Amulets"
  match_mode: exact

# ── CORE SPECIAL UNIQUES / ITEMS ──────────────────────────────────────────
- name: "Rare Set Items"
  source: core
  match: "Rare Set Items"
  match_mode: exact

- name: "Unique Items"
  source: core
  match: "Unique Items"
  match_mode: exact

- name: "Weaver's Will Items"
  source: core
  match: "Weaver's Will Items"
  match_mode: exact

- name: "Cocooned Uniques"
  source: core
  match: "Cocooned Uniques"
  match_mode: exact

- name: "Primordial Uniques"
  source: core
  match: "Primordial Uniques"
  match_mode: exact

# Note: Very Strict drops "New Season 4 Uniques" — not included here

- name: "Unnamed core rule (Legendary)"
  source: core
  match: ""
  match_mode: exact

- name: "Unique Idols"
  source: core
  match: "Unique Idols"
  match_mode: exact

# ── ALTARS (Very Strict = Min. Tier 7) ────────────────────────────────────
- name: "Generic Good Altars (Min. Tier 7)"
  source: core
  match: "Generic Good Altars (Min. Tier 7)"
  match_mode: exact

# ── WANTED TIER 6 (core rule) ─────────────────────────────────────────────
- name: "Wanted Tier 6 (Can Edit Affixes & Item Type)"
  source: core
  match: "Wanted Tier 6"
  match_mode: contains

# ── TIER 6 STRICT ITEM RULES ──────────────────────────────────────────────
- name: "Tier 6 Strict Helmet"
  source: core
  match: "Tier 6 Strict Helmet"
  match_mode: exact

- name: "Tier 6 Strict Idol Altar"
  source: core
  match: "Tier 6 Strict Idol Altar"
  match_mode: exact

# ── BUILD-SPECIFIC WANTED TIER 7 ──────────────────────────────────────────
- name: "Wanted Tier 7"
  source: build
  match: "Wanted Tier 7"
  match_mode: contains
  prefix_build_name: true

# ── TIER 7 STRICT (core + build-specific) ─────────────────────────────────
- name: "Tier 7 Strict Helmet"
  source: core
  match: "Tier 7 Strict Helmet"
  match_mode: exact

- name: "Tier 7 Strict Idol Altar"
  source: core
  match: "Tier 7 Strict Idol Altar"
  match_mode: exact

- name: "Tier 7 Strict (build-specific)"
  source: build
  match: "Tier 7 Strict"
  match_mode: startswith
  prefix_build_name: true

# ── CORE MULTI-EXALTED RULES ──────────────────────────────────────────────
- name: "Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Multi Exalted (Min. Tier 7 & Tier 6)"
  match_mode: exact

- name: "Multi Exalted (Min. 2 Tier 7)"
  source: core
  match: "Multi Exalted (Min. 2 Tier 7)"
  match_mode: exact

- name: "Triple+ Exalted (Min. 1 Tier 7)"
  source: core
  match: "Triple+ Exalted (Min. 1 Tier 7)"
  match_mode: exact

- name: "Corrupted Multi Exalted (Min. Tier 7 & Tier 6)"
  source: core
  match: "Corrupted Multi Exalted"
  match_mode: contains

# ── GLOBAL UNIQUE TIERS (Very Strict drops 1 LP entirely) ─────────────────
- name: "Dungeons / Arena Uniques"
  source: core
  match: "Dungeons / Arena Uniques"
  match_mode: exact

- name: "Uniques With 15+ Weaver's Will"
  source: core
  match: "Uniques With 15+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 2 LP (70+ LPL)"
  source: core
  match: "Uniques With 2 LP (70+ LPL)"
  match_mode: exact

- name: "Rare Dungeon Drops"
  source: core
  match: "Rare Dungeon Drops"
  match_mode: exact

- name: "Rare Monolith Timeline Boss Drops"
  source: core
  match: "Rare Monolith Timeline Boss Drops"
  match_mode: exact

- name: "Harbinger Uniques"
  source: core
  match: "Harbinger Uniques"
  match_mode: exact

- name: "A Tier & Very Rare Uniques"
  source: core
  match: "A Tier & Very Rare Uniques"
  match_mode: exact

- name: "Leveling Uniques Campaign"
  source: core
  match: "Leveling Uniques Campaign"
  match_mode: exact

- name: "Leveling Uniques (Reflect  lvl 35)"
  source: core
  match: "Leveling Uniques (Reflect  lvl 35)"
  match_mode: exact

# ── BUILD-SPECIFIC UNIQUE PLANNER RULES ───────────────────────────────────
- name: "Uniques & Sets From Planner"
  source: build
  match: "Uniques & Sets From Planner"
  match_mode: contains
  prefix_build_name: true

- name: "Uniques From Planner 1 LP"
  source: build
  match: "Uniques From Planner 1 LP"
  match_mode: contains
  prefix_build_name: true

# ── HIGH-LP / HIGH-WW UNIQUES (Very Strict tightens 3 LP to 25+ LPL) ──────
- name: "Uniques With 19+ Weaver's Will"
  source: core
  match: "Uniques With 19+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 3 LP (25+ LPL)"
  source: core
  match: "Uniques With 3 LP (25+ LPL)"
  match_mode: exact

- name: "Uniques With 22+ Weaver's Will"
  source: core
  match: "Uniques With 22+ Weaver's Will"
  match_mode: exact

- name: "Uniques With 4 LP (All)"
  source: core
  match: "Uniques With 4 LP (All)"
  match_mode: exact

- name: "S Tier & Extremely Rare Uniques"
  source: core
  match: "S Tier & Extremely Rare Uniques"
  match_mode: exact

unmatched_build_rules:
  placement: after
  after: "Uniques From Planner 1 LP"
  prefix_build_name: true

ignore_build_rules: []

overrides: []
